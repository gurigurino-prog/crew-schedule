<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#081226">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crew Schedule">
<title>Crew Schedule</title>
<style>
:root{
  --bg:#081226;
  --bg2:#0d1a33;
  --card:rgba(255,255,255,0.06);
  --line:rgba(255,255,255,0.08);
  --text:#eef2ff;
  --muted:#9aa7bd;
  --blue:#73b7ff;
  --blue2:#3d8dff;
  --green:#6ee7b7;
  --yellow:#fbbf24;
  --red:#f87171;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:linear-gradient(180deg,var(--bg),#06101f 60%,#07101f);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif}
body{max-width:430px;margin:0 auto;min-height:100vh}
button,input{font:inherit}
.view{display:none;padding:56px 16px 96px}
.view.active{display:block}
.top{padding:54px 20px 16px}
.label{font-size:11px;letter-spacing:3px;color:var(--blue);text-transform:uppercase}
.title{font-size:24px;font-weight:800;margin-top:10px}
.sub{font-size:12px;color:var(--muted);margin-top:4px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px}
.hero{margin:0 16px 16px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.25);background:linear-gradient(135deg,#112448,#0a1630)}
.dday{font-size:11px;color:var(--blue);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.route{display:flex;align-items:center;justify-content:space-between;gap:8px}
.port{text-align:center;min-width:88px}
.port .code{font-size:26px;font-weight:900}
.port .time{font-size:22px;font-weight:800;margin-top:2px}
.port .meta{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.mid{flex:1;text-align:center}
.line{height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);position:relative;margin:10px 0}
.line span{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:13px}
.small{font-size:11px;color:var(--blue)}
.stats{display:flex;gap:10px;padding:0 16px;margin-bottom:18px}
.stat{flex:1;padding:14px 8px;text-align:center}
.stat .v{font-size:15px;font-weight:800}
.stat .l{font-size:10px;color:var(--muted);margin-top:4px}
.sec{padding:0 16px}
.sec-title{font-size:11px;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:10px}
.item{padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(115,183,255,.12);flex:0 0 40px}
.item .body{flex:1;min-width:0}
.r1{font-size:14px;font-weight:700}
.r2{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.right{text-align:right}
.right .v{font-size:12px;color:var(--blue);font-weight:700}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:10px;margin-top:4px}
.badge.yellow{background:rgba(251,191,36,.12);color:var(--yellow)}
.badge.blue{background:rgba(115,183,255,.12);color:var(--blue)}
.empty{padding:40px 10px;color:var(--muted);text-align:center}
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;background:rgba(7,14,28,.96);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:10px 0 calc(12px + env(safe-area-inset-bottom))}
.nav button{background:none;border:0;color:#7f8aa0;display:flex;flex-direction:column;gap:3px;align-items:center;padding:4px 16px}
.nav button.active{color:var(--blue)}
.nav .t{font-size:10px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.back{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.08);border:0;color:var(--text)}
.h1{font-size:20px;font-weight:800}
.info{padding:12px 14px;border-radius:14px;background:rgba(115,183,255,.08);border:1px solid rgba(115,183,255,.16);color:var(--muted);font-size:12px;line-height:1.6;margin-bottom:14px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;color:var(--muted);margin-bottom:6px}
.fi{width:100%;padding:12px 13px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);outline:none}
.row{display:flex;gap:10px}
.row>.fg{flex:1}
.tzchips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line);font-size:12px;color:var(--muted)}
.chip.active{background:rgba(115,183,255,.14);border-color:rgba(115,183,255,.36);color:var(--blue);font-weight:700}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;margin-bottom:12px}
.sw{width:44px;height:24px;border-radius:999px;background:rgba(255,255,255,.12);position:relative}
.sw:after{content:"";position:absolute;left:3px;top:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s}
.sw.on{background:var(--blue2)}
.sw.on:after{left:23px}
.btn{width:100%;padding:14px;border:0;border-radius:14px;background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;font-weight:800}
.info-card{padding:14px;margin-bottom:8px}
.info-card .k{font-size:11px;color:var(--muted);margin-bottom:4px}
.info-card .v{font-size:15px;font-weight:700;line-height:1.45}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.big{padding:16px}
.big .k{font-size:11px;color:var(--muted);margin-bottom:6px}
.big .v{font-size:22px;font-weight:900;color:var(--blue)}
.del{margin-top:10px;width:100%;padding:13px;border-radius:14px;border:1px solid rgba(248,113,113,.2);background:rgba(248,113,113,.08);color:var(--red);font-weight:700}
.hide{display:none}
</style>
</head>
<body>

<div id="home" class="view active">
  <div class="top">
    <div class="label">✈ CREW SCHEDULE</div>
    <div class="title">안녕하세요 👋</div>
    <div class="sub" id="todayText"></div>
    <div class="sub" id="tzText"></div>
  </div>
  <div id="nextWrap"></div>
  <div class="stats" id="statsRow"></div>
  <div class="sec">
    <div class="sec-title">예정 스케줄</div>
    <div id="upcomingList"></div>
  </div>
</div>

<div id="add" class="view">
  <div class="header">
    <button class="back" onclick="go('home')">←</button>
    <div class="h1">스케줄 추가</div>
  </div>
  <div class="info">기록용, D-day 관리, 홈 화면 앱처럼 쓰기 좋게 만든 버전이에요. 입력하면 바로 저장돼요.</div>
  <div class="row">
    <div class="fg">
      <label class="fl">편명</label>
      <input id="flightNo" class="fi" placeholder="KE001">
    </div>
    <div class="fg">
      <label class="fl">날짜</label>
      <input id="date" type="date" class="fi">
    </div>
  </div>
  <div class="row">
    <div class="fg">
      <label class="fl">출발지</label>
      <input id="dep" class="fi" maxlength="3" placeholder="ICN" oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="fg">
      <label class="fl">도착지</label>
      <input id="arr" class="fi" maxlength="3" placeholder="NRT" oninput="this.value=this.value.toUpperCase()">
    </div>
  </div>
  <div class="fg">
    <label class="fl">시간 기준</label>
    <div class="tzchips">
      <button type="button" class="chip active" data-basis="KST" onclick="setBasis(this)">KST</button>
      <button type="button" class="chip" data-basis="UTC" onclick="setBasis(this)">UTC</button>
      <button type="button" class="chip" data-basis="LOCAL" onclick="setBasis(this)">기기 시간대</button>
    </div>
  </div>
  <div class="row">
    <div class="fg">
      <label class="fl">출발 시간</label>
      <input id="depTime" type="time" class="fi">
    </div>
    <div class="fg">
      <label class="fl">도착 시간</label>
      <input id="arrTime" type="time" class="fi">
    </div>
  </div>
  <div class="toggle card" onclick="toggleLayover()">
    <div>
      <div style="font-size:14px;font-weight:700">레이오버</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">체류 일정이 있으면 켜기</div>
    </div>
    <div id="laySw" class="sw"></div>
  </div>
  <div id="layFields" class="hide">
    <div class="row">
      <div class="fg">
        <label class="fl">체류 도시</label>
        <input id="layCity" class="fi" placeholder="Tokyo">
      </div>
      <div class="fg">
        <label class="fl">체류 시간(h)</label>
        <input id="layHrs" type="number" class="fi" placeholder="18">
      </div>
    </div>
  </div>
  <button class="btn" onclick="addFlight()">스케줄 추가</button>
</div>

<div id="detail" class="view">
  <div class="header">
    <button class="back" onclick="go('home')">←</button>
    <div class="h1" id="detailTitle">상세</div>
  </div>
  <div id="detailBody"></div>
</div>

<div id="stats" class="view">
  <div class="header" style="margin-bottom:16px">
    <div class="h1">📊 비행 통계</div>
  </div>
  <div class="grid" id="bigStats"></div>
  <div class="sec-title">전체 스케줄</div>
  <div id="allList"></div>
</div>

<div class="nav">
  <button id="nav-home" class="active" onclick="go('home')"><div>🏠</div><div class="t">홈</div></button>
  <button id="nav-add" onclick="go('add')"><div>➕</div><div class="t">추가</div></button>
  <button id="nav-stats" onclick="go('stats')"><div>📊</div><div class="t">통계</div></button>
</div>

<script>
const AIRPORTS = {
  ICN:{flag:"🇰🇷", tz:"Asia/Seoul"}, GMP:{flag:"🇰🇷", tz:"Asia/Seoul"}, PUS:{flag:"🇰🇷", tz:"Asia/Seoul"},
  NRT:{flag:"🇯🇵", tz:"Asia/Tokyo"}, HND:{flag:"🇯🇵", tz:"Asia/Tokyo"}, KIX:{flag:"🇯🇵", tz:"Asia/Tokyo"},
  FUK:{flag:"🇯🇵", tz:"Asia/Tokyo"}, CTS:{flag:"🇯🇵", tz:"Asia/Tokyo"},
  JFK:{flag:"🇺🇸", tz:"America/New_York"}, LAX:{flag:"🇺🇸", tz:"America/Los_Angeles"}, SFO:{flag:"🇺🇸", tz:"America/Los_Angeles"},
  ORD:{flag:"🇺🇸", tz:"America/Chicago"}, SEA:{flag:"🇺🇸", tz:"America/Los_Angeles"},
  CDG:{flag:"🇫🇷", tz:"Europe/Paris"}, FRA:{flag:"🇩🇪", tz:"Europe/Berlin"}, LHR:{flag:"🇬🇧", tz:"Europe/London"},
  SIN:{flag:"🇸🇬", tz:"Asia/Singapore"}, BKK:{flag:"🇹🇭", tz:"Asia/Bangkok"}, HKG:{flag:"🇭🇰", tz:"Asia/Hong_Kong"},
  SYD:{flag:"🇦🇺", tz:"Australia/Sydney"}, DXB:{flag:"🇦🇪", tz:"Asia/Dubai"}
};
const $ = id => document.getElementById(id);
const state = {
  basis:"KST",
  layover:false,
  flights: loadFlights()
};

function loadFlights(){
  try{ return JSON.parse(localStorage.getItem("crew_schedule_app_v1") || "[]"); }
  catch(e){ return []; }
}
function saveFlights(){
  localStorage.setItem("crew_schedule_app_v1", JSON.stringify(state.flights));
}
function pad(n){ return String(n).padStart(2,"0"); }
function todayLocalISO(){
  const d = new Date();
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function fmtToday(){
  return new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
}
function tzLabel(){
  try{
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const off = -new Date().getTimezoneOffset();
    const sign = off >= 0 ? "+" : "-";
    const h = Math.floor(Math.abs(off)/60);
    const m = Math.abs(off)%60;
    return "현재 기기 시간대 · " + tz + " · UTC" + sign + pad(h) + (m ? ":" + pad(m) : "");
  }catch(e){
    return "현재 기기 시간대";
  }
}
function basisOffsetMinutes(basis){
  if(basis === "KST") return 540;
  if(basis === "UTC") return 0;
  return -new Date().getTimezoneOffset();
}
function duration(depTime, arrTime){
  const a = depTime.split(":").map(Number);
  const b = arrTime.split(":").map(Number);
  let dep = a[0]*60 + a[1];
  let arr = b[0]*60 + b[1];
  let plus = 0;
  if(arr < dep){ arr += 1440; plus = 1; }
  const t = arr - dep;
  return { total:t, h:Math.floor(t/60), m:t%60, plus:plus };
}
function makeUTCDate(dateStr, timeStr, basis, dayPlus){
  const p = dateStr.split("-").map(Number);
  const t = timeStr.split(":").map(Number);
  const ms = Date.UTC(p[0], p[1]-1, p[2] + (dayPlus||0), t[0], t[1]) - basisOffsetMinutes(basis)*60000;
  return new Date(ms);
}
function utcHM(dateObj){
  return pad(dateObj.getUTCHours()) + ":" + pad(dateObj.getUTCMinutes());
}
function localAtAirport(dateObj, code){
  const ap = AIRPORTS[code];
  if(!ap) return null;
  try{
    return {
      time: dateObj.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:ap.tz}),
      date: dateObj.toLocaleDateString("ko-KR",{month:"short",day:"numeric",timeZone:ap.tz}),
      tz: ap.tz.split("/").pop().replace(/_/g," ")
    };
  }catch(e){ return null; }
}
function flag(code){
  return AIRPORTS[code] ? AIRPORTS[code].flag : "🌐";
}
function computedFlight(f){
  const d = duration(f.depTime, f.arrTime);
  const depUtc = makeUTCDate(f.date, f.depTime, f.basis, 0);
  const arrUtc = makeUTCDate(f.date, f.arrTime, f.basis, d.plus);
  return {
    raw:f,
    dur:d,
    depUtc,
    arrUtc,
    depUTC:utcHM(depUtc),
    arrUTC:utcHM(arrUtc),
    depLocal:localAtAirport(depUtc, f.dep),
    arrLocal:localAtAirport(arrUtc, f.arr)
  };
}
function setBasis(btn){
  document.querySelectorAll(".chip").forEach(el => el.classList.remove("active"));
  btn.classList.add("active");
  state.basis = btn.dataset.basis;
}
function toggleLayover(){
  state.layover = !state.layover;
  $("laySw").classList.toggle("on", state.layover);
  $("layFields").classList.toggle("hide", !state.layover);
}
function go(view){
  ["home","add","detail","stats"].forEach(v => $(v).classList.remove("active"));
  $(view).classList.add("active");
  ["home","add","stats"].forEach(v => {
    const el = $("nav-"+v);
    if(el) el.classList.toggle("active", v === view);
  });
  if(view === "home") renderHome();
  if(view === "stats") renderStats();
}
function addFlight(){
  const data = {
    id: Date.now(),
    flightNo: $("flightNo").value.trim().toUpperCase(),
    date: $("date").value,
    dep: $("dep").value.trim().toUpperCase(),
    arr: $("arr").value.trim().toUpperCase(),
    depTime: $("depTime").value,
    arrTime: $("arrTime").value,
    basis: state.basis,
    layover: state.layover,
    layCity: state.layover ? $("layCity").value.trim() : "",
    layHrs: state.layover ? Number($("layHrs").value || 0) : 0
  };
  if(!data.flightNo || !data.date || !data.dep || !data.arr || !data.depTime || !data.arrTime){
    alert("모든 항목을 입력해주세요.");
    return;
  }
  state.flights.push(data);
  saveFlights();
  ["flightNo","date","dep","arr","depTime","arrTime","layCity","layHrs"].forEach(id => $(id).value = "");
  state.layover = false;
  $("laySw").classList.remove("on");
  $("layFields").classList.add("hide");
  go("home");
}
function removeFlight(id){
  if(!confirm("이 스케줄을 삭제할까요?")) return;
  state.flights = state.flights.filter(f => f.id !== id);
  saveFlights();
  go("home");
}
function showDetail(id){
  const f = state.flights.find(x => x.id === id);
  if(!f) return;
  const c = computedFlight(f);
  $("detailTitle").textContent = f.flightNo;
  $("detailBody").innerHTML =
    '<div class="card hero" style="margin:0 0 12px 0">' +
      '<div class="route">' +
        '<div class="port">' +
          '<div>' + flag(f.dep) + '</div>' +
          '<div class="code">' + f.dep + '</div>' +
          '<div class="time">' + f.depTime + '</div>' +
          '<div class="meta">UTC ' + c.depUTC + (c.depLocal ? '<br>현지 ' + c.depLocal.time : '') + '</div>' +
        '</div>' +
        '<div class="mid">' +
          '<div class="small">' + formatDuration(c.dur) + '</div>' +
          '<div class="line"><span>✈</span></div>' +
          '<div class="small">' + f.flightNo + '</div>' +
        '</div>' +
        '<div class="port">' +
          '<div>' + flag(f.arr) + '</div>' +
          '<div class="code">' + f.arr + '</div>' +
          '<div class="time">' + f.arrTime + (c.dur.plus ? ' <span style="font-size:11px;color:var(--green)">+' + c.dur.plus + '일</span>' : '') + '</div>' +
          '<div class="meta">UTC ' + c.arrUTC + (c.arrLocal ? '<br>현지 ' + c.arrLocal.time : '') + '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    infoCard("날짜", new Date(f.date+"T00:00:00").toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"})) +
    infoCard("비행시간", formatDuration(c.dur)) +
    infoCard("시간 기준", basisText(f.basis)) +
    (c.arrLocal ? infoCard("도착지 현지 기준", c.arrLocal.date + " " + c.arrLocal.time + " (" + c.arrLocal.tz + ")") : "") +
    (f.layover ? infoCard("레이오버", (f.layCity || f.arr) + " · " + f.layHrs + "시간") : "") +
    '<button class="del" onclick="removeFlight(' + f.id + ')">스케줄 삭제</button>';
  go("detail");
}
function infoCard(k,v){
  return '<div class="card info-card"><div class="k">' + k + '</div><div class="v">' + v + '</div></div>';
}
function basisText(b){
  if(b === "KST") return "KST (한국 표준시)";
  if(b === "UTC") return "UTC";
  return "기기 시간대";
}
function formatDuration(d){
  return d.h + "h" + (d.m ? " " + d.m + "m" : "");
}
function renderHome(){
  $("todayText").textContent = fmtToday();
  $("tzText").textContent = tzLabel();

  const list = state.flights.slice().sort((a,b) => {
    return computedFlight(a).depUtc - computedFlight(b).depUtc;
  });
  const today = todayLocalISO();
  const upcoming = list.filter(f => f.date >= today);

  const next = upcoming.length ? upcoming[0] : null;
  if(next){
    const c = computedFlight(next);
    const diffDays = Math.round((new Date(next.date+"T00:00:00") - new Date(today+"T00:00:00"))/86400000);
    let dday = diffDays === 0 ? "🔴 오늘 비행" : diffDays === 1 ? "🟡 내일 비행" : "⏳ D-" + diffDays;
    $("nextWrap").innerHTML =
      '<div class="hero card" onclick="showDetail(' + next.id + ')">' +
        '<div class="dday">' + dday + '</div>' +
        '<div class="route">' +
          '<div class="port">' +
            '<div>' + flag(next.dep) + ' ' + next.dep + '</div>' +
            '<div class="time">' + next.depTime + '</div>' +
            '<div class="meta">UTC ' + c.depUTC + (c.depLocal ? '<br>현지 ' + c.depLocal.time : '') + '</div>' +
          '</div>' +
          '<div class="mid">' +
            '<div class="small">' + formatDuration(c.dur) + '</div>' +
            '<div class="line"><span>✈</span></div>' +
            '<div class="small">' + next.flightNo + '</div>' +
          '</div>' +
          '<div class="port">' +
            '<div>' + flag(next.arr) + ' ' + next.arr + '</div>' +
            '<div class="time">' + next.arrTime + (c.dur.plus ? ' <span style="font-size:11px;color:var(--green)">+' + c.dur.plus + '일</span>' : '') + '</div>' +
            '<div class="meta">UTC ' + c.arrUTC + (c.arrLocal ? '<br>현지 ' + c.arrLocal.time : '') + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  } else {
    $("nextWrap").innerHTML = '<div class="sec"><div class="card empty">예정된 비행이 없어요</div></div>';
  }

  const totalMin = list.reduce((sum,f) => sum + computedFlight(f).dur.total, 0);
  const layCnt = list.filter(f => f.layover).length;
  $("statsRow").innerHTML =
    statBox(Math.floor(totalMin/60) + "h", "총 비행시간") +
    statBox(list.length + "편", "총 편수") +
    statBox(layCnt + "회", "레이오버");

  if(!upcoming.length){
    $("upcomingList").innerHTML = '<div class="card empty">아직 예정 스케줄이 없어요.</div>';
  }else{
    $("upcomingList").innerHTML = upcoming.map(f => {
      const c = computedFlight(f);
      return '<div class="card item" onclick="showDetail(' + f.id + ')">' +
        '<div class="ico">' + (f.layover ? '🌙' : '✈️') + '</div>' +
        '<div class="body">' +
          '<div class="r1">' + flag(f.dep) + ' ' + f.dep + ' → ' + flag(f.arr) + ' ' + f.arr + '</div>' +
          '<div class="r2">📅 ' + shortDate(f.date) + ' · ' + f.flightNo + ' · ' + f.depTime + '~' + f.arrTime + (c.dur.plus ? ' (+' + c.dur.plus + '일)' : '') + '</div>' +
        '</div>' +
        '<div class="right">' +
          '<div class="v">' + formatDuration(c.dur) + '</div>' +
          '<div class="badge ' + (f.layover ? 'yellow' : 'blue') + '">' + (f.layover ? '레이오버 ' + f.layHrs + 'h' : '당일') + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }
}
function statBox(v,l){
  return '<div class="card stat"><div class="v">' + v + '</div><div class="l">' + l + '</div></div>';
}
function shortDate(d){
  return new Date(d+"T00:00:00").toLocaleDateString("ko-KR",{month:"short",day:"numeric",weekday:"short"});
}
function renderStats(){
  const list = state.flights.slice().sort((a,b) => computedFlight(a).depUtc - computedFlight(b).depUtc);
  const totalMin = list.reduce((sum,f) => sum + computedFlight(f).dur.total, 0);
  const layCnt = list.filter(f => f.layover).length;
  const layHours = list.reduce((sum,f) => sum + Number(f.layHrs || 0), 0);
  $("bigStats").innerHTML =
    bigBox("총 비행시간", Math.floor(totalMin/60) + "h " + (totalMin%60) + "m") +
    bigBox("총 편수", list.length + "편") +
    bigBox("레이오버", layCnt + "회") +
    bigBox("총 체류시간", layHours + "h");

  $("allList").innerHTML = list.length ? list.map(f => {
    const c = computedFlight(f);
    return '<div class="card item" onclick="showDetail(' + f.id + ')">' +
      '<div class="ico">' + (f.layover ? '🌙' : '✈️') + '</div>' +
      '<div class="body">' +
        '<div class="r1">' + flag(f.dep) + ' ' + f.dep + ' → ' + flag(f.arr) + ' ' + f.arr + '</div>' +
        '<div class="r2">' + shortDate(f.date) + ' · ' + f.flightNo + ' · ' + f.depTime + '~' + f.arrTime + (c.dur.plus ? ' (+' + c.dur.plus + '일)' : '') + '</div>' +
      '</div>' +
      '<div class="right"><div class="v">' + formatDuration(c.dur) + '</div></div>' +
    '</div>';
  }).join('') : '<div class="card empty">저장된 스케줄이 없어요.</div>';
}
function bigBox(k,v){
  return '<div class="card big"><div class="k">' + k + '</div><div class="v">' + v + '</div></div>';
}

window.addEventListener("error", function(e){
  document.body.insertAdjacentHTML("beforeend",
    '<div style="position:fixed;left:10px;right:10px;bottom:90px;background:#3b0d0d;color:#fff;padding:12px 14px;border-radius:12px;font-size:12px;z-index:9999">오류: ' +
    String(e.message).replace(/</g,"&lt;") + '</div>');
});

renderHome();
</script>
</body>
</html>
